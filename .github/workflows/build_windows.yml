name: Build Windows App

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Get Dependencies
        run: |
          cd resto_caisse_app
          flutter pub get

      - name: Build Windows
        run: |
          cd resto_caisse_app
          flutter build windows --release

      - name: Package Release
        run: |
          mkdir release-pkg
          xcopy /E /I resto_caisse_app\build\windows\x64\runner\Release\* release-pkg\
          powershell Compress-Archive -Path release-pkg\* -DestinationPath Windows-DolceVitaPalace.zip

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Windows-DolceVitaPalace-Release
          path: Windows-DolceVitaPalace.zip
