name: resto_serveur_app
description: "Application Serveur - Dolce Vita Palace"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # UI
  cupertino_icons: ^1.0.8

  # HTTP & API
  http: ^1.2.0
  dio: ^5.9.2

  # State Management
  provider: ^6.1.1

  # Local Storage
  shared_preferences: ^2.2.2

  # Image Loading
  cached_network_image: ^3.3.1

  # Utils
  intl: ^0.20.2
  flutter_svg: ^2.0.9
  connectivity_plus: ^6.0.5
  image: ^4.3.0
  path_provider: ^2.1.5
  permission_handler: ^12.0.1

  # Printing Bluetooth
  blue_thermal_printer: ^1.2.3
  esc_pos_utils_plus: ^2.0.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.7

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/app_icon.png"
  min_sdk_android: 21
  adaptive_icon_background: "#1A1A2E"
  adaptive_icon_foreground: "assets/app_icon.png"
  adaptive_icon_foreground_inset: 0

flutter_native_splash:
  color: "#1A1A2E"
  image: assets/logo.png
  android: true
  ios: false
  android_12:
    color: "#1A1A2E"
    image: assets/logo.png

flutter:
  uses-material-design: true
  assets:
    - assets/app_icon.png
    - assets/logo.png
